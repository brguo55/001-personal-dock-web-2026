<?xml version="1.0" encoding="UTF-8"?>
<!--
  PersonalDock — App Icon
  Cyberpunk 2077 aesthetic: yellow-black, angular, industrial, high-tech.
  1024 × 1024 px — macOS icon source.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024"
     xmlns="http://www.w3.org/2000/svg">
  <title>PersonalDock</title>

  <defs>
    <!-- Clip to macOS rounded-square shape (≈ 22 % corner radius) -->
    <clipPath id="mask">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>

    <!-- Ambient yellow glow emanating from centre-top -->
    <radialGradient id="bgGlow" cx="50%" cy="43%" r="52%">
      <stop offset="0%"   stop-color="#f5c518" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f5c518" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm orange bloom — bottom-right corner -->
    <radialGradient id="bgOrange" cx="84%" cy="88%" r="40%">
      <stop offset="0%"   stop-color="#e8732a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e8732a" stop-opacity="0"/>
    </radialGradient>

    <!-- Surface lift: lighter top, darker bottom — adds depth -->
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2e2610" stop-opacity="0.55"/>
      <stop offset="48%"  stop-color="#0c0a07" stop-opacity="0"/>
      <stop offset="100%" stop-color="#030200" stop-opacity="0.52"/>
    </linearGradient>

    <!-- P letter — warm gold gradient, top-left bright to bottom-right deep -->
    <linearGradient id="pGrad" x1="268" y1="228"
                              x2="672" y2="742"
                              gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffe650"/>
      <stop offset="100%" stop-color="#c99200"/>
    </linearGradient>

    <!-- Top stripe: yellow → orange → transparent -->
    <linearGradient id="stripeGrad" x1="56" y1="0"
                                    x2="648" y2="0"
                                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f5c518" stop-opacity="1"/>
      <stop offset="54%"  stop-color="#e8732a" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#f5c518" stop-opacity="0"/>
    </linearGradient>

    <!-- Dot grid: evenly spaced tiny yellow dots -->
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="0"  cy="0"  r="1.3" fill="#f5c518" opacity="0.11"/>
      <circle cx="48" cy="0"  r="1.3" fill="#f5c518" opacity="0.11"/>
      <circle cx="0"  cy="48" r="1.3" fill="#f5c518" opacity="0.11"/>
      <circle cx="48" cy="48" r="1.3" fill="#f5c518" opacity="0.11"/>
      <circle cx="24" cy="24" r="0.8" fill="#f5c518" opacity="0.06"/>
    </pattern>

    <!-- Glow filter applied to the P letterform -->
    <filter id="pGlow" x="-22%" y="-18%" width="144%" height="136%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#f5c518" flood-opacity="0.42" result="flood"/>
      <feComposite in="flood" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for HUD detail elements -->
    <filter id="hudGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g clip-path="url(#mask)">

    <!-- ══════════════════════════════════════════════════════
         BACKGROUND LAYERS
         ══════════════════════════════════════════════════════ -->
    <rect width="1024" height="1024" fill="#0c0a07"/>
    <rect width="1024" height="1024" fill="url(#surface)"/>
    <rect width="1024" height="1024" fill="url(#bgGlow)"/>
    <rect width="1024" height="1024" fill="url(#bgOrange)"/>
    <rect width="1024" height="1024" fill="url(#dots)"/>

    <!-- Faint diagonal panel-line accents (industrial armour plating feel) -->
    <line x1="660" y1="60"  x2="1020" y2="660" stroke="#f5c518" stroke-width="1.2" opacity="0.052"/>
    <line x1="740" y1="60"  x2="1024" y2="570" stroke="#f5c518" stroke-width="0.9" opacity="0.032"/>
    <line x1="830" y1="60"  x2="1024" y2="452" stroke="#f5c518" stroke-width="0.7" opacity="0.020"/>

    <!-- ══════════════════════════════════════════════════════
         INNER FRAME BORDER
         ══════════════════════════════════════════════════════ -->
    <rect x="24" y="24" width="976" height="976" rx="200"
          fill="none" stroke="#f5c518" stroke-width="1.5" opacity="0.17"/>

    <!-- ══════════════════════════════════════════════════════
         TOP STATUS STRIPE
         ══════════════════════════════════════════════════════ -->
    <rect x="56" y="50" width="592" height="7" rx="3.5" fill="url(#stripeGrad)"/>
    <!-- End-tick of stripe -->
    <rect x="644" y="42" width="4" height="22" rx="2" fill="#f5c518" opacity="0.30"/>

    <!-- ══════════════════════════════════════════════════════
         CORNER L-BRACKETS  (targeting-reticle style)
         ══════════════════════════════════════════════════════ -->
    <!-- Top-left -->
    <path d="M56,192 L56,56 L192,56"
          fill="none" stroke="#f5c518" stroke-width="15"
          stroke-linecap="square" stroke-linejoin="miter"/>
    <!-- Top-right -->
    <path d="M832,56 L968,56 L968,192"
          fill="none" stroke="#f5c518" stroke-width="15"
          stroke-linecap="square" stroke-linejoin="miter"/>
    <!-- Bottom-left -->
    <path d="M56,832 L56,968 L192,968"
          fill="none" stroke="#f5c518" stroke-width="15"
          stroke-linecap="square" stroke-linejoin="miter"/>
    <!-- Bottom-right -->
    <path d="M968,832 L968,968 L832,968"
          fill="none" stroke="#f5c518" stroke-width="15"
          stroke-linecap="square" stroke-linejoin="miter"/>

    <!-- Tiny corner-dot accents at bracket ends -->
    <circle cx="192" cy="56" r="4" fill="#f5c518" opacity="0.32"/>
    <circle cx="832" cy="56" r="4" fill="#f5c518" opacity="0.32"/>
    <circle cx="56"  cy="192" r="4" fill="#f5c518" opacity="0.32"/>
    <circle cx="968" cy="192" r="4" fill="#f5c518" opacity="0.32"/>

    <!-- ══════════════════════════════════════════════════════
         HEADER CENTRE DECORATION  (above P)
         ══════════════════════════════════════════════════════ -->
    <circle cx="512" cy="168" r="5.5" fill="#f5c518" opacity="0.58"/>
    <rect x="448" y="165" width="54" height="5" rx="2.5" fill="#f5c518" opacity="0.18"/>
    <rect x="522" y="165" width="54" height="5" rx="2.5" fill="#f5c518" opacity="0.18"/>

    <!-- ══════════════════════════════════════════════════════
         MAIN  P  LETTERFORM
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         Bar thickness : 82 px
         Vertical stem : x=268–350,  y=228–738  (82 × 510)
         Top bar       : x=268–672,  y=228–310  (404 × 82)
         Bowl R-wall   : x=590–672,  y=228–486  (82 × 258)
         Middle bar    : x=268–672,  y=404–486  (404 × 82)
         ══════════════════════════════════════════════════════ -->
    <g filter="url(#pGlow)">

      <!-- Vertical stem -->
      <rect x="268" y="228" width="82" height="510" fill="url(#pGrad)"/>

      <!-- Top bar -->
      <rect x="268" y="228" width="404" height="82" fill="url(#pGrad)"/>

      <!-- Right wall of bowl -->
      <rect x="590" y="228" width="82" height="258" fill="url(#pGrad)"/>

      <!-- Middle bar (closes the bowl at the bottom) -->
      <rect x="268" y="404" width="404" height="82" fill="url(#pGrad)"/>

      <!-- ── Cyberpunk angular notch ──────────────────────
           A diagonal cut taken out of the bottom-right corner
           of the bowl's right wall — signature Cyberpunk 2077
           sharp-angle panel detail.                         -->
      <polygon points="632,404 672,404 672,466" fill="#0c0a07"/>

      <!-- ── Stem channel ─────────────────────────────────
           A narrow dark slot across the stem — industrial
           detail suggesting a recessed panel seam.          -->
      <rect x="268" y="350" width="14" height="12" fill="#0c0a07" opacity="0.52"/>

    </g>

    <!-- ── Bowl interior scan line (subtle HUD texture) ── -->
    <rect x="354" y="344" width="236" height="2" fill="#f5c518" opacity="0.11"/>

    <!-- ══════════════════════════════════════════════════════
         HUD ACCENT — targeting diamond + status indicator
         (sits to the right of the P bowl)
         ══════════════════════════════════════════════════════ -->
    <g filter="url(#hudGlow)">
      <!-- Diamond reticle -->
      <polygon points="724,348 744,370 724,392 704,370"
               fill="none" stroke="#f5c518" stroke-width="2.5" opacity="0.46"/>
      <circle cx="724" cy="370" r="3.5" fill="#f5c518" opacity="0.64"/>

      <!-- Short extension line to right -->
      <line x1="747" y1="370" x2="790" y2="370"
            stroke="#f5c518" stroke-width="1.8" opacity="0.28"/>

      <!-- Small terminal square -->
      <rect x="794" y="363" width="13" height="13" rx="1.5"
            fill="none" stroke="#f5c518" stroke-width="1.5" opacity="0.28"/>
    </g>

    <!-- Status LED (orange pulse — system active) -->
    <circle cx="718" cy="465" r="9" fill="#0c0a07"/>
    <circle cx="718" cy="465" r="9" fill="none"
            stroke="#e8732a" stroke-width="2.5" opacity="0.84"/>
    <circle cx="718" cy="465" r="3.5" fill="#e8732a" opacity="0.95"/>

    <!-- ══════════════════════════════════════════════════════
         TASK-LIST / CHECKLIST INDICATORS
         Three horizontal pill bars below the P represent the
         app's task sections: Dashboard, GTD, Action Board.
         ══════════════════════════════════════════════════════ -->
    <!-- Thin separator line -->
    <rect x="268" y="793" width="330" height="1.5" fill="#f5c518" opacity="0.17"/>

    <!-- Row 1 — full-length, most visible -->
    <rect x="280" y="811" width="10" height="10" rx="1.5"
          fill="#f5c518" opacity="0.50"/>
    <rect x="300" y="809" width="246" height="14" rx="7"
          fill="#f5c518" opacity="0.43"/>

    <!-- Row 2 -->
    <rect x="280" y="841" width="10" height="10" rx="1.5"
          fill="#f5c518" opacity="0.30"/>
    <rect x="300" y="839" width="185" height="14" rx="7"
          fill="#f5c518" opacity="0.26"/>

    <!-- Row 3 — faintest, echoing distance -->
    <rect x="280" y="871" width="10" height="10" rx="1.5"
          fill="#f5c518" opacity="0.17"/>
    <rect x="300" y="869" width="218" height="14" rx="7"
          fill="#f5c518" opacity="0.14"/>

    <!-- ══════════════════════════════════════════════════════
         SIDE TICK MARKS  (HUD range-finder scale)
         ══════════════════════════════════════════════════════ -->
    <!-- Left edge -->
    <rect x="50" y="438" width="27" height="4" rx="2" fill="#f5c518" opacity="0.36"/>
    <rect x="50" y="510" width="17" height="4" rx="2" fill="#f5c518" opacity="0.22"/>
    <rect x="50" y="582" width="27" height="4" rx="2" fill="#f5c518" opacity="0.36"/>

    <!-- Right edge -->
    <rect x="947" y="438" width="27" height="4" rx="2" fill="#f5c518" opacity="0.36"/>
    <rect x="957" y="510" width="17" height="4" rx="2" fill="#f5c518" opacity="0.22"/>
    <rect x="947" y="582" width="27" height="4" rx="2" fill="#f5c518" opacity="0.36"/>

    <!-- ══════════════════════════════════════════════════════
         BOTTOM ACCENT BAR
         ══════════════════════════════════════════════════════ -->
    <rect x="56" y="950" width="510" height="5" rx="2.5"
          fill="#f5c518" opacity="0.16"/>

    <!-- Atmospheric micro-text (barely legible — adds texture) -->
    <text x="960" y="212"
          font-family="'Courier New',Courier,monospace"
          font-size="13" fill="#f5c518" opacity="0.10"
          text-anchor="end" letter-spacing="1.6">PDK-1</text>
    <text x="960" y="230"
          font-family="'Courier New',Courier,monospace"
          font-size="13" fill="#f5c518" opacity="0.08"
          text-anchor="end" letter-spacing="1.6">v2.0</text>

  </g>
</svg>
