<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dinosaur's La La Land</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="sidebar-hover-zone" id="sidebarHoverZone" aria-hidden="true"></div>

  <div class="app-shell">
    <aside class="app-sidebar" aria-label="Primary navigation sidebar">
      <p class="app-sidebar__title">Sections</p>
      <nav class="view-nav" id="viewNav" aria-label="Primary navigation">
        <button type="button" class="nav-btn" data-view="dashboard">Dashboard</button>
        <button type="button" class="nav-btn" data-view="actionBoard">Action Board</button>
        <button type="button" class="nav-btn" data-view="calendar">Calendar</button>
        <button type="button" class="nav-btn" data-view="waitingFor">GTD</button>
        <button type="button" class="nav-btn" data-view="budgetPlanner">Budget Spending</button>
        <button type="button" class="nav-btn" data-view="expenseTracker">Expense Tracker</button>
        <button type="button" class="nav-btn" data-view="budgetPlanning">Budget Planner</button>
        <button type="button" class="nav-btn" data-view="planner">Planner</button>
        <button type="button" class="nav-btn" data-view="promise">Promise</button>
        <button type="button" class="nav-btn" data-view="diary">Diary</button>
        <button type="button" class="nav-btn" data-view="bits">Bits</button>
        <button type="button" class="nav-btn" data-view="datesBoard">Dates</button>
        <button type="button" class="nav-btn" data-view="lessonsLearned">Lessons</button>
        <button type="button" class="nav-btn" data-view="settings">Settings</button>
      </nav>
    </aside>

    <div class="app-main">
      <header class="app-header">
        <div class="brand-panel">
          <p class="eyebrow">Capture Notes. Plan Ahead. Stay Calm. Keep Organized.</p>
          <div class="brand-row">
            <div>
              <h1>Dinosaur's La La Land</h1>
              <p class="subtitle" id="viewDescription">
                A calm place to organize your day, tasks, and budget.
              </p>
            </div>
            <p class="today-stamp" id="todayStamp"></p>
          </div>
        </div>
      </header>

      <input type="file" id="importJsonInput" accept=".json,application/json" hidden />

      <main id="viewRoot" class="view-root"></main>
    </div>
  </div>

  <template id="actionSectionTemplate">
    <article class="section-card">
      <div class="section-card__header">
        <div class="section-card__title-wrap">
          <span class="section-card__emoji"></span>
          <div>
            <h3 class="section-card__title"></h3>
            <p class="section-card__meta"></p>
          </div>
        </div>
        <span class="section-card__count"></span>
      </div>

      <ul class="task-list"></ul>

      <form class="section-form">
        <input type="text" placeholder="Add a task" maxlength="120" />
        <button type="submit">Add</button>
      </form>
    </article>
  </template>

  <template id="budgetItemTemplate">
    <li class="budget-item">
      <div class="budget-item__row">
        <span class="budget-item__drag-handle" aria-hidden="true" title="Drag to reorder">⠇</span>
        <label class="budget-item__main">
          <input type="checkbox" class="budget-item__check" />
          <span class="budget-item__copy">
            <strong class="budget-item__title"></strong>
            <span class="budget-item__meta"></span>
          </span>
        </label>

        <div class="budget-item__side">
          <span class="budget-item__amount"></span>
          <div class="budget-item__actions">
            <button type="button" class="tiny-btn edit-item-btn">Edit</button>
            <button type="button" class="tiny-btn delete-item-btn">Delete</button>
            <button type="button" class="budget-item__expand-btn" aria-label="Show details" aria-expanded="false">▾</button>
          </div>
        </div>
      </div>
      <div class="budget-item__details-panel"></div>
    </li>
  </template>

  <script src="app.js"></script>
</body>
</html>
